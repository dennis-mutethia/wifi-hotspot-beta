<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="title">FREE Wi-Fi</title>
    <link rel="icon" type="image/png" sizes="16x16" href="images/logo.PNG">
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/fontawesome-all.min.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/vanzj.css" />

    <style>
        iframe {
            width: 100%;
            border: none;
            height: 360px;
        }
    </style>
    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/md5.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>
    <!--Mikrotik Login Form Start -->
    <form id="sendin" name="sendin" action="$(link-login-only)" method="POST">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>
    <!--Mikrotik Login Form End -->

    <!-- Header -->
    <div id="header" class="row text-center header">
        <h4 id="header-title" class="header">Loading...</h4>
    </div>

    <div class="demo">
        <div class="container">
            <div class="row">
                <div class="col-md-offset-3 col-md-6">

                    <!-- Video -->
                    <iframe id="advideo" allow="autoplay; encrypted-media" allowfullscreen></iframe>

                    <h6 id="tagline" class="text-primary text-center"></h6>

                    <input type="number" class="form-control" id="adphone" placeholder="Phone No. e.g 07123456789" />
                    <h6 id="notice" class="text-center text-danger"></h6>
                    <button id="adconnectbutton" type="button" class="btn btn-success btn-block"
                        onclick="connect();">Connect</button>

                    <!-- Sliding Images -->
                    <div class="slidingImage">
                        <div class="slider">
                            <div id="slides" class="slides"></div>
                            <div id="nav-auto" class="navigation-auto"></div>
                        </div>
                    </div>

                    <hr />
                    <h5 class="text-center">For Support or Advertisement Queries</h5>
                    <ul class="list-unstyled text-center">
                        <li>Call us on <a href="tel:0759697757">0759 69 77 57</a></li>
                        <br />
                        <li class="text-muted"><a id="terms-link" href="#">Terms and Conditions</a> apply</li>
                    </ul>

                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Portal state — populated after API fetch
         */
        const hotspotId = 1
        const baseUrl = 'http://localhost:5000'


        var portalData = {};
        var isSubscribed = false;
        var player;
        var slideCounter = 1;
        var slideInterval;

        /**
         * 1. Fetch all portal data from server
         *    GET /api/portal-data?hotspot_id=<id>
         *
         *    Expected JSON shape:
         *    {
         *      client:  { name, background_color, foreground_color },
         *      hotspot: { id, hotspot_username, hotspot_password },
         *      video:   { source_id },
         *      images:  [ { source_id }, ... ]
         *    }
         */

        function fetchPortalData() {
            $.getJSON(baseUrl + '/api/portal-data', { hotspot_id: hotspotId })
                .done(function (data) {
                    portalData = data;
                    renderPortal(data);
                })
                .fail(function (xhr) {
                    $('#notice').html('Failed to load portal. Please refresh.');
                    console.error('Portal data fetch failed', xhr);
                });
        }

        /**
         * 2. Render everything once data arrives
         */
        function renderPortal(d) {
            var client = d.client;
            var hotspot = d.hotspot;
            var video = d.video;
            var images = d.images;

            //Title
            $('#title').html(client.name + ' FREE WiFi');

            // Header
            $('#header').css('background-color', client.background_color);
            $('#header-title')
                .text(client.name + ' FREE Wi-Fi')
                .css({ 'background-color': client.background_color, 'color': client.foreground_color });

            // Favicon
            $('link[rel="icon"]').attr('href', 'images/logo.PNG');

            // Page title
            document.title = client.name + ' FREE Wi-Fi';

            // Tagline
            $('#tagline').html(
                'Enter Your Valid Phone Number Below and Enjoy Super Fast Free WIFI' +
                '<br/> Powered by ' + client.name
            );

            // Video iframe
            var src = 'https://www.youtube.com/embed/' + video.source_id +
                '?playlist=' + video.source_id +
                '&loop=1&enablejsapi=1&rel=0&modestbranding=1' +
                '&showinfo=0&controls=0&disablekb=1&autoplay=1&mute=1';
            $('#advideo').attr('src', src);

            // Terms link
            $('#terms-link').attr('href', '/terms?hotspot_id=' + hotspot.id);

            // Slides
            renderSlides(images);

            // Restore saved phone
            var saved = localStorage.getItem('userPhone');
            if (saved) $('#adphone').val(saved);
            $('#adphone').focus();
        }

        /**
         * 3. Build image slider dynamically
         */
        function renderSlides(images) {
            var $slides = $('#slides').empty();
            var $nav = $('#nav-auto').empty();

            images.forEach(function (img, i) {
                var idx = i + 1;

                // Radio input
                $slides.before(
                    $('<input>', { type: 'radio', name: 'radio-btn', id: 'radio' + idx })
                );

                // Slide div
                var $slide = $('<div>').addClass('slide' + (i === 0 ? ' first' : ''));
                var $img = $('<img>').attr({
                    src: 'https://i.postimg.cc/' + img.source_id,
                    alt: '',
                    height: '320'
                });
                $slides.append($slide.append($img));

                // Nav dot
                $nav.append($('<div>').addClass('auto-btn' + idx));
            });

            // Auto-slide
            clearInterval(slideInterval);
            var total = images.length;
            slideCounter = 1;
            slideInterval = setInterval(function () {
                var radio = document.getElementById('radio' + slideCounter);
                if (radio) radio.checked = true;
                slideCounter = (slideCounter % total) + 1;
            }, 3000);
        }

        /**
         * 4. YouTube Player API
         */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('advideo', {
                events: { onReady: onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            document.onclick = function () {
                if (player.isMuted()) player.unMute();
                setTimeout(function () {
                    var btn = document.getElementById('adconnectbutton');
                    if (btn) {
                        btn.innerHTML = 'Connect';
                        btn.disabled = false;
                        connect();
                    }
                }, 30000);
            };
        }

        /**
         * 5. Subscribe — POST phone number
         */
        function subscribe() {
            var phone = $('#adphone').val().trim();
            if (phone.length === 10) {
                $('#notice').html('');
                $.post(baseUrl + '/api/subscribe', {
                    phone: '254' + phone.slice(-9),
                    hotspot_id: portalData.hotspot ? portalData.hotspot.id : ''
                }, function () {
                    localStorage.setItem('userPhone', phone);
                    isSubscribed = true;
                });
            } else {
                $('#notice').html('Enter Valid Phone Number');
            }
        }

        /**
         * 6. Connect — POST login credentials to hotspot
         */
        function connect() {
            if (isSubscribed) {
                $('input[name="username"]').val(portalData.hotspot.hotspot_username);
                $('input[name="password"]').val(portalData.hotspot.hotspot_password);
                $('#sendin').submit();
            } else {
                subscribe();
            }
            return false;
        }

        // Subscribe on each keyup
        $('#adphone').on('keyup', function () { subscribe(); });

        // Bootstrap
        $(document).ready(function () { fetchPortalData(); });
    </script>

</body>

</html>
