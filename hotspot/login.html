<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="title">Matrix Systems Wi-Fi</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/logo.PNG">
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/fontawesome-all.min.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/vanzj.css" />

    <style>
        iframe {
            width: 100%;
            border: none;
            height: 360px;
        }
    </style>
    <script src="js/jquery-1.12.4.min.js"></script>
    <script src="js/md5.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>

<body>
    <!--Mikrotik Login Form Start -->
    <form id="sendin" name="sendin" action="$(link-login-only)" method="POST">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>
    <!--Mikrotik Login Form End -->

    <!-- Header -->
    <div id="header" class="row text-center header">
        <h4 id="header-title" class="header">Loading...</h4>
    </div>

    <div class="demo">
        <div class="container">
            <div class="row">
                <div class="col-md-offset-3 col-md-6">

                    <!-- Video -->
                    <div id="advideo"></div>

                    <h6 id="tagline" class="text-primary text-center"></h6>

                    <input type="number" class="form-control" id="adphone" placeholder="Phone No. e.g 07123456789" />
                    <h6 id="notice" class="text-center text-danger"></h6>
                    <button id="adconnectbutton" type="button" class="btn btn-default btn-block" onclick="connect();"
                        style="color: black;" disabled>Watch the Video First then Tap to Connect!</button>

                    <br />

                    <!--Sliding Picture Start-->
                    <div class="slidingImage">
                        <div class="slider">
                            <div class="slides" id="slides">
                                <input type="radio" name="radio-btn" id="radio1">
                                <input type="radio" name="radio-btn" id="radio2">
                                <input type="radio" name="radio-btn" id="radio3">
                                <input type="radio" name="radio-btn" id="radio4">
                                <input type="radio" name="radio-btn" id="radio5">

                                <div class="slide first">
                                    <img id="img1" src="https://i.postimg.cc/none" alt="" height="320px">
                                </div>
                                <div class="slide">
                                    <img id="img2" src="https://i.postimg.cc/none" alt="" height="320px">
                                </div>
                                <div class="slide">
                                    <img id="img3" src="https://i.postimg.cc/none" alt="" height="320px">
                                </div>
                                <div class="slide">
                                    <img id="img4" src="https://i.postimg.cc/none" alt="" height="320px">
                                </div>
                                <div class="slide">
                                    <img id="img5" src="https://i.postimg.cc/none" alt="" height="320px">
                                </div>
                            </div>

                            <!-- Navigation auto -->
                            <div class="navigation-auto">
                                <div class="auto-btn1"></div>
                                <div class="auto-btn2"></div>
                                <div class="auto-btn3"></div>
                                <div class="auto-btn4"></div>
                                <div class="auto-btn5"></div>
                            </div>
                        </div>

                        <!-- JavaScript for Auto-Slide -->
                        <script type="text/javascript">
                            var totalSlides = 5; // Total number of images
                            var counter = 1;

                            setInterval(function () {
                                // Select the radio button corresponding to the current slide
                                document.getElementById('radio' + counter).checked = true;

                                counter++;
                                if (counter > totalSlides) {
                                    counter = 1; // Reset to the first slide
                                }
                            }, 3000); // Adjust the timing as needed
                        </script>
                    </div>
                    <!--Sliding Picture End-->

                    <hr />
                    <h5 class="text-center">For Support or Advertisement Queries</h5>
                    <ul class="list-unstyled text-center">
                        <li>Call us on <a href="tel:0105565532">010 556 5532</a></li>
                        <br />
                        <li class="text-muted"><a id="terms-link" href="terms.html">Terms and Conditions</a> apply</li>
                    </ul>

                </div>
            </div>
        </div>
    </div>
    <!-- <script src="js/script.js"></script> -->
    <script>
        const hotspotId = 6;

        //const baseUrl = 'http://localhost:5000';
        const baseUrl = 'https://matrix-hotspot.vercel.app'

        /**
        * Portal state — populated after API fetch
        */
        var portalData = {};
        var isSubscribed = false;
        var player;
        var slideCounter = 1;
        var slideInterval;

        function fetchPortalData() {
            $.getJSON(baseUrl + '/api/portal-data/' + hotspotId)
                .done(function (data) {
                    portalData = data;
                    renderPortal(data);
                })
                .fail(function (xhr) {
                    $('#notice').html('Failed to load portal. Please refresh.');
                    console.error('Portal data fetch failed', xhr);
                });
        }

        /**
        * 2. Render everything once data arrives
        */
        function renderPortal(d) {
            var client = d.client;
            var video = d.video;
            var images = d.images;

            //Title
            $('#title').html(client.name + ' Wi-Fi');

            // Header
            $('#header').css('background-color', client.background_color);
            $('#header-title')
                .text(client.name + ' Wi-Fi')
                .css({ 'background-color': client.background_color, 'color': client.foreground_color });

            // Favicon
            $('link[rel="icon"]').attr('href', 'img/logo.PNG');

            // Page title
            document.title = client.name + ' Wi-Fi';

            // Tagline
            $('#tagline').html(
                'Enter Your Valid Phone Number Below and Enjoy Super Fast WIFI' +
                '<br /> Powered by ' + client.name
            );

            // Slides
            renderSlides(images);

            // Restore saved phone
            // var saved = localStorage.getItem('userPhone');
            // if (saved) $('#adphone').val(saved);
            $('#adphone').focus();

            // Video iframe
            var src = 'https://www.youtube.com/embed/' + video.source_id +
                '?playlist=' + video.source_id +
                '&loop=1&enablejsapi=1&rel=0&modestbranding=1' +
                '&showinfo=0&controls=0&disablekb=1&autoplay=1&mute=1';
            $('#advideo').attr('src', src);
        }

        /**
        * 3. Populate slider images dynamically
        */
        function renderSlides(images) {
            images.forEach(function (img, i) {
                var idx = i + 1;
                let src = 'https://i.postimg.cc/' + img.source_id
                $('#img' + idx).attr('src', src);
            });

        }

        /**
        * 4. YouTube Player API
        */
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('advideo', {
                events: { onReady: onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            if (player.isMuted()) player.unMute();

            if (player.getPlayerState() != YT.PlayerState.PLAYING) {
                player.playVideo();
            }
        }

        /**
        * 5. Subscribe — POST phone number
        */
        function subscribe(connectAfter = false) {
            var phone = $('#adphone').val().trim();
            if (phone.length === 10) {
                $('#notice').html('');
                $.post(baseUrl + '/api/subscribe/'+ hotspotId, {
                    phone: '254' + phone.slice(-9)
                }, function (data) {
                    isSubscribed = true;

                    $('input[name="username"]').val(data.username);
                    $('input[name="password"]').val(data.password);

                    $('#adconnectbutton').html('Connect');
                    $('#adconnectbutton').removeClass('btn-default').addClass('btn-success');
                    $('#adconnectbutton').prop('disabled', false);

                    if (connectAfter) $('#sendin').submit();
                });
            } else {
                $('#notice').html('Enter Valid Phone Number');
            }
        }

        /**
        * 6. Connect — POST login credentials to hotspot
        */
        function connect() {
            if (isSubscribed) {
                $('#sendin').submit();
            } else {
                subscribe(true);
            }
            return false;
        }

        // Subscribe on each keyup
        $('#adphone').on('keyup', function () {

            if (player.isMuted()) player.unMute();

            if (player.getPlayerState() != YT.PlayerState.PLAYING) {
                player.playVideo();
            }

            if (!isSubscribed) subscribe();
        });

        // Bootstrap
        $(document).ready(function () { fetchPortalData(); });
    </script>
</body>

</html>
